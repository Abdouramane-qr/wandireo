server {
    listen 80;
    listen [::]:80;
    server_name tripanova.code-ai-insight.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name tripanova.code-ai-insight.com;
    resolver 127.0.0.11 ipv6=off valid=30s;

    ssl_certificate /etc/letsencrypt/live/tripanova.code-ai-insight.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tripanova.code-ai-insight.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 64M;

    location / {
        set $upstream http://nginx:80;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_read_timeout 300;
    }
}
