services:
  translator-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: translator-api:latest
    container_name: translator-api
    restart: unless-stopped
    ports:
      - "8900:8900"
    env_file:
      - .env          # Must exist — copy .env.example to .env and fill in API_KEY
    environment:
      # These values can also be overridden here without touching .env
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8900/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
