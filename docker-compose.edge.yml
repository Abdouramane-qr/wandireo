services:
  nginx:
    ports: []

  proxy:
    image: nginx:1.27-alpine
    container_name: wdr-edge
    restart: unless-stopped
    depends_on:
      nginx:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/proxy/live/default.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    healthcheck:
      test: ["CMD-SHELL", "printf 'GET / HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' | nc 127.0.0.1 80 | grep 'HTTP/1.1 301' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  certbot:
    image: certbot/certbot:latest
    container_name: wdr-certbot
    profiles: ["manual"]
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt

volumes:
  certbot_www:
    driver: local
    name: bc-certbot-www
  certbot_conf:
    driver: local
    name: bc-certbot-conf
